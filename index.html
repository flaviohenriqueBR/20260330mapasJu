<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Mapa Eleitoral</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="sidebar">

    <h2>Mapa Eleitoral</h2>

    <label>Cidade</label>
    <select id="cidade">
        <option value="americana">Americana</option>
        <option value="santa barbara d oeste">Santa Bárbara d Oeste</option>
        <option value="nova odessa">Nova Odessa</option>
        <option value="piracicaba">Piracicaba</option>
        <option value="limeira">Limeira</option>
        <option value="campinas">Campinas</option>
        <option value="são bernardo do campo">São Bernardo do Campo</option>
        <option value="guarulhos">Guarulhos</option>
        <option value="são josé dos campos">São José dos Campos</option>
        <option value="franca">Franca</option>
        <option value="jundiaí">Jundiaí</option>
        <option value="indaiatuba">Indaiatuba</option>
        <option value="paulínia">Paulínia</option>
        <option value="santo andré">Santo André</option>
        <option value="osasco">Osasco</option>
        <option value="embu das artes">Embu das Artes</option>
        <option value="sumaré">Sumaré</option>
        <option value="hortolândia">Hortolândia</option>
        <option value="ribeirão preto">Ribeirão Preto</option>
        <option value="sorocaba">Sorocaba</option>
        <option value="são paulo1">São Paulo - Leste</option>
        <option value="são paulo2">São Paulo - Centro Expandido</option>
    </select>

    <label>Indicador</label>
    <select id="indicador"></select>

    <label>Classes (Jenks)</label>
    <select id="classes">
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
    </select>

    <label>Paleta</label>
    <select id="paleta">
        <option value="YlGnBu">Azul</option>
        <option value="Reds" selected>Vermelho</option>
        <option value="PuRd">Roxo</option>
        <option value="Greens">Verde</option>
    </select>

    <button id="baixarMapa">
        Baixar JPEG
    </button>
    <button id="baixarPDF">
    Baixar PDF
    </button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>
<script src="https://unpkg.com/chroma-js@2.4.2/chroma.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="js/exportar.js"></script>
<script src="js/script.js"></script>

</body>
</html>
